{% extends "layout/base.html" %}

{% block 'title' %} Edit Gender Page {% endblock 'title' %}
{% block 'content' %}
{% include "include/toastMessage.html" %}
{% include "include/Sidebar.html" %}

<div class = "p-2 sm:ml-64 mt-16 md:mt-14">
    <form action = "/gender/edit/{{gender.gender_id}}" method = 'post'>
        {% csrf_token %}
        <div class = "mx-100 mt-20 md: w-1/3 mb-2 ">
            <label for="gender" class = "block text-lg font-medium mb-2">Gender Edit</label>
            <input  type= "text" name = "gender" id = "gender" class ="bg-white mb-2 px-3 py-2.5 border-2 border-gray-900 text-black block text-sm rounded-lg w-full focus:outline-none focus:ring-blue-400 focus:border-blue-600 hover:border-blue-600" value = "{{gender.gender}}"  />
            
            <div class=" flex justify-between">
                <a href="/gender/list" class = "bg-gray-300 hover:bg-gray-800 hover:text-white text-sm font-medium text-black px-3 py-2.5 cursor-pointer shadow-sm hover:outline-none rounded-sm ">Back</a>
                <button type="submit" class = "bg-blue-500 hover:bg-blue-800 text-sm font-medium text-white px-3 py-2.5 rounded-sm shadow-sm cursor-pointer " >
                    Save Gender 
                </button>
            </div>
        </div>
    </form>
</div>

{% endblock 'content' %}
